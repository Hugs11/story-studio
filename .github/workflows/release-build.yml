name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows bundle
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run check:version

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ("v$packageVersion" -ne $env:RELEASE_TAG) {
            throw "Release tag $env:RELEASE_TAG does not match package version $packageVersion."
          }

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: story-studio-windows
          path: src-tauri/target/release/bundle/**
