name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the use case before proposing a solution — it helps evaluate fit.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that is currently difficult or impossible?
      placeholder: "When I create a pack with more than 10 menus, I have to…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: If you have a specific idea, describe it here. Leave blank if you just want to raise the use case.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you have tried, or alternative approaches you considered.
