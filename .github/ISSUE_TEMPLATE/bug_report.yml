name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much as you can.

  - type: input
    id: version
    attributes:
      label: Story Studio version
      description: Shown in the window title bar
      placeholder: "0.8.9"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do?
      placeholder: |
        1. Open a project with…
        2. Click on…
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include any error messages shown in the app.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Project type (simple story / pack), number of menus/stories, whether it reproduces on a fresh project, etc.
        Attach the `.mbah` project file if it helps (remove audio/images you don't want to share).
